<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnold Release Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style/main.css" />
</head>
<body>

<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">A</div>
      Arnold Documentation
    </div>
    <div class="header-right">
      <span class="updated-at" id="updated-at"></span>
      <span class="header-meta">Arnold Core</span>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀</button>
    </div>
  </header>

  <aside>
    <div id="version-list">
      <div class="state-message" style="padding:20px">
        <div class="spinner"></div>
      </div>
    </div>
  </aside>

  <main id="main-content">
    <div class="state-message">
      <div class="spinner"></div>
      <span>Loading changelogs…</span>
    </div>
  </main>

</div>

<script>
  // ── Theme ──────────────────────────────────────────────────────────────────
  const $toggle = document.getElementById('theme-toggle');

  function getTheme() {
    return localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    $toggle.textContent = t === 'dark' ? '☀' : '☽';
    localStorage.setItem('theme', t);
  }

  applyTheme(getTheme());

  $toggle.addEventListener('click', () => {
    applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
  });

  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    data: null,
    activeId: null,
    activeFilter: 'all',
  };

  const $list    = document.getElementById('version-list');
  const $main    = document.getElementById('main-content');
  const $updAt   = document.getElementById('updated-at');

  // ── Load data ──────────────────────────────────────────────────────────────
  async function loadData() {
    const res = await fetch('/data/changelogs.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── Classify section ───────────────────────────────────────────────────────
  function classifySection(heading) {
    if (/enhance|feature|new|improv|add/i.test(heading)) return 'enhancements';
    if (/bug|fix|crash|resolv/i.test(heading))           return 'bug-fixes';
    if (/break|compat|deprecat/i.test(heading))          return 'breaking';
    return '';
  }

  // ── Render sidebar ─────────────────────────────────────────────────────────
  function renderSidebar() {
    const { changelogs } = state.data;

    const groups = new Map();
    for (const cl of changelogs) {
      const major = cl.version.split('.')[0];
      const key = `${major}.x`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(cl);
    }

    $list.innerHTML = [...groups.entries()].map(([label, versions]) => `
      <div class="series-group">
        <span class="series-label">${esc(label)}</span>
        ${versions.map(cl => {
          const isActive = cl.versionId === state.activeId ? 'active' : '';
          return `<button class="version-btn ${isActive}" onclick="selectVersion('${cl.versionId}')">${esc(cl.version)}</button>`;
        }).join('')}
      </div>`
    ).join('');
  }

  // ── Render changelog ───────────────────────────────────────────────────────
  function renderChangelog(cl) {
    if (cl.error) {
      $main.innerHTML = `
        <div class="changelog-header">
          <div class="changelog-version"><h1>${esc(cl.version)}</h1></div>
        </div>
        <div class="error-box">
          This version couldn't be scraped: ${esc(cl.error)}<br><br>
          <a href="${esc(cl.sourceUrl)}" target="_blank" rel="noopener">↗ View on Autodesk Help</a>
        </div>`;
      return;
    }

    const rt = cl.releaseType || 'release';
    const badgeClass = {
      feature:  'badge-feature-lg',
      bugfix:   'badge-bugfix-lg',
      breaking: 'badge-breaking-lg',
      release:  'badge-release-lg',
    }[rt] || 'badge-release-lg';
    const badgeLabel = {
      feature:  'Feature Release',
      bugfix:   'Bug Fix Release',
      breaking: 'Breaking Changes',
      release:  'Release',
    }[rt] || rt;

    const sectionTypes = [...new Set(cl.sections.map(s => classifySection(s.heading)).filter(Boolean))];

    const filterBar = sectionTypes.length > 1 ? `
      <div class="filter-bar">
        <button class="filter-chip ${state.activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
        ${sectionTypes.map(t => `
          <button class="filter-chip ${state.activeFilter === t ? 'active' : ''}" onclick="setFilter('${t}')">
            ${t.replace('-', ' ')}
          </button>`).join('')}
      </div>` : '';

    const visibleSections = cl.sections.filter(s =>
      state.activeFilter === 'all' || classifySection(s.heading) === state.activeFilter
    );

    const sectionsHtml = visibleSections.map((sec, i) => {
      const cls = classifySection(sec.heading);
      const num = String(i + 1).padStart(2, '0');
      const itemsHtml = sec.items.map(item => {
        const tickets = item.tickets?.length
          ? `<div class="item-tickets">${item.tickets.map(t => `<span class="ticket">${esc(t)}</span>`).join('')}</div>`
          : '';
        return `<div class="item"><div class="item-text">${esc(item.text)}</div>${tickets}</div>`;
      }).join('');
      return `
        <div class="section">
          <div class="section-heading ${cls}">${num} ${esc(sec.heading)}</div>
          <div class="item-list">${itemsHtml}</div>
        </div>`;
    }).join('');

    const sysReq = cl.systemRequirements ? (() => {
      // Split on sentence boundaries into bullet points
      const bullets = cl.systemRequirements
        .split(/(?<=\.)\s+/)
        .map(s => s.trim())
        .filter(s => s.length > 4);
      const bulletHtml = bullets.length > 1
        ? `<ul class="sysreq-list">${bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>`
        : `<div class="sysreq-text">${esc(cl.systemRequirements)}</div>`;
      return `
        <div class="sysreq">
          <div class="sysreq-label">System Requirements</div>
          ${bulletHtml}
        </div>`;
    })() : '';

    $main.innerHTML = `
      <div class="changelog-header">
        <div class="changelog-version">
          <h1>${esc(cl.version)}</h1>
          <span class="release-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        ${cl.intro ? `<p class="changelog-intro">${esc(cl.intro)}</p>` : ''}
        <a class="source-link" href="${esc(cl.sourceUrl)}" target="_blank" rel="noopener">↗ View on Autodesk Help</a>
      </div>
      ${filterBar}
      ${sectionsHtml || '<div class="empty-state"><p>No sections were parsed from this page.</p></div>'}
      ${sysReq}`;
  }

  // ── Select version ─────────────────────────────────────────────────────────
  window.selectVersion = function(id) {
    state.activeId = id;
    state.activeFilter = 'all';
    renderSidebar();
    const cl = state.data.changelogs.find(c => c.versionId === id);
    if (cl) renderChangelog(cl);
  };

  window.setFilter = function(f) {
    state.activeFilter = f;
    const cl = state.data.changelogs.find(c => c.versionId === state.activeId);
    if (cl) renderChangelog(cl);
  };

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  async function init() {
    try {
      state.data = await loadData();

      if (!state.data.changelogs?.length) {
        $list.innerHTML = '';
        $main.innerHTML = `
          <div class="empty-state">
            <h2>No data yet</h2>
            <p>Run the GitHub Actions workflow to populate the changelogs.</p>
          </div>`;
        return;
      }

      if (state.data.updatedAt) {
        const d = new Date(state.data.updatedAt);
        $updAt.textContent = `Updated ${d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`;
      }

      renderSidebar();
      selectVersion(state.data.changelogs[0].versionId);

    } catch (e) {
      $list.innerHTML = '';
      $main.innerHTML = `<div class="error-box">Failed to load changelog data: ${esc(e.message)}</div>`;
    }
  }

  init();
</script>

</body>
</html>
