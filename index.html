<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnold Release Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --border:    #222228;
      --border-hi: #333340;
      --text:      #e4e4ec;
      --muted:     #636375;
      --accent:    #e85d2a;
      --accent-lo: rgba(232,93,42,0.12);
      --feature:   #3b82f6;
      --bugfix:    #10b981;
      --breaking:  #f59e0b;
      --tag-bg:    #1c1c22;
      --radius:    6px;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .updated-at {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Sidebar */
    aside {
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
    }
    .sidebar-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 20px 6px;
      display: block;
    }
    .version-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
    }
    .version-btn:hover  { background: #1a1a20; }
    .version-btn.active { background: var(--accent-lo); color: #fff; }

    .badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-feature  { background: rgba(59,130,246,0.2);  color: var(--feature); }
    .badge-bugfix   { background: rgba(16,185,129,0.2);  color: var(--bugfix); }
    .badge-breaking { background: rgba(245,158,11,0.2);  color: var(--breaking); }
    .badge-release  { background: rgba(100,100,120,0.2); color: var(--muted); }
    .badge-error    { background: rgba(232,93,42,0.15);  color: var(--accent); }

    /* Main */
    main {
      overflow-y: auto;
      padding: 32px 40px 60px;
      max-width: 900px;
    }

    /* Loading */
    .state-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 40px;
      color: var(--muted);
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Changelog */
    .changelog-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .changelog-version {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 8px;
    }
    .changelog-version h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .release-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 4px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      position: relative;
      top: -4px;
    }
    .badge-feature-lg  { background: rgba(59,130,246,0.15); color: var(--feature); border: 1px solid rgba(59,130,246,0.3); }
    .badge-bugfix-lg   { background: rgba(16,185,129,0.15); color: var(--bugfix);  border: 1px solid rgba(16,185,129,0.3); }
    .badge-breaking-lg { background: rgba(245,158,11,0.15); color: var(--breaking);border: 1px solid rgba(245,158,11,0.3); }
    .badge-release-lg  { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border-hi); }

    .changelog-intro {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 680px;
      margin-bottom: 10px;
    }
    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .source-link:hover { color: var(--accent); }

    /* Sections */
    .section { margin-bottom: 32px; }
    .section-heading {
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-heading.enhancements { color: var(--feature); }
    .section-heading.bug-fixes    { color: var(--bugfix); }
    .section-heading.breaking     { color: var(--breaking); }

    /* Items */
    .item-list { display: flex; flex-direction: column; gap: 2px; }
    .item {
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .item:hover { background: #141418; border-color: var(--border); }
    .item-text { font-size: 14px; line-height: 1.65; }
    .item-tickets {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }
    .ticket {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--tag-bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* System req */
    .sysreq {
      margin-top: 32px;
      padding: 14px 16px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .sysreq-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .sysreq-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--mono);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover  { border-color: var(--border-hi); color: var(--text); }
    .filter-chip.active { background: var(--accent-lo); border-color: var(--accent); color: var(--text); }

    /* Error */
    .error-box {
      padding: 16px 20px;
      border: 1px solid rgba(232,93,42,0.3);
      background: rgba(232,93,42,0.08);
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      line-height: 1.7;
    }
    .error-box a { color: inherit; }

    /* Empty state */
    .empty-state {
      padding: 60px 0;
    }
    .empty-state h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .empty-state p  { color: var(--muted); max-width: 480px; line-height: 1.7; font-size: 14px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 8px 12px;
        overflow-x: auto;
        white-space: nowrap;
      }
      .sidebar-label { display: none; }
      .version-btn { display: inline-flex; width: auto; padding: 6px 10px; border-radius: 4px; }
      main { padding: 20px 16px 40px; }
      .changelog-version h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">A</div>
      Arnold Release Notes
    </div>
    <div class="header-right">
      <span class="updated-at" id="updated-at"></span>
      <span class="header-meta">Arnold Core</span>
    </div>
  </header>

  <aside>
    <span class="sidebar-label">Versions</span>
    <div id="version-list">
      <div class="state-message" style="padding:20px">
        <div class="spinner"></div>
      </div>
    </div>
  </aside>

  <main id="main-content">
    <div class="state-message">
      <div class="spinner"></div>
      <span>Loading changelogs…</span>
    </div>
  </main>

</div>

<script>
  const state = {
    data: null,          // full changelogs.json contents
    activeId: null,
    activeFilter: 'all',
  };

  const $list = document.getElementById('version-list');
  const $main = document.getElementById('main-content');
  const $updatedAt = document.getElementById('updated-at');

  // ── Load data ──────────────────────────────────────────────────────────────
  async function loadData() {
    const res = await fetch('/data/changelogs.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── Classify section heading ───────────────────────────────────────────────
  function classifySection(heading) {
    if (/enhance|feature|new|improv|add/i.test(heading)) return 'enhancements';
    if (/bug|fix|crash|resolv/i.test(heading))           return 'bug-fixes';
    if (/break|compat|deprecat/i.test(heading))          return 'breaking';
    return '';
  }

  // ── Render sidebar ─────────────────────────────────────────────────────────
  function renderSidebar() {
    const { changelogs } = state.data;
    $list.innerHTML = changelogs.map(cl => {
      const rt = cl.error ? 'error' : (cl.releaseType || 'release');
      const isActive = cl.versionId === state.activeId ? 'active' : '';
      const label = { feature: 'feat', bugfix: 'fix', breaking: 'break!', release: 'rel', error: 'err' }[rt] || rt;
      return `
        <button class="version-btn ${isActive}" onclick="selectVersion('${cl.versionId}')">
          <span>${cl.version}</span>
          <span class="badge badge-${rt}">${label}</span>
        </button>`;
    }).join('');
  }

  // ── Render changelog ───────────────────────────────────────────────────────
  function renderChangelog(cl) {
    if (cl.error) {
      $main.innerHTML = `
        <div class="changelog-header">
          <div class="changelog-version"><h1>${esc(cl.version)}</h1></div>
        </div>
        <div class="error-box">
          This version's page couldn't be scraped: ${esc(cl.error)}<br><br>
          <a href="${esc(cl.sourceUrl)}" target="_blank" rel="noopener">↗ Try viewing it directly on Autodesk Help</a>
        </div>`;
      return;
    }

    const rt = cl.releaseType || 'release';
    const badgeClass = { feature: 'badge-feature-lg', bugfix: 'badge-bugfix-lg', breaking: 'badge-breaking-lg', release: 'badge-release-lg' }[rt] || 'badge-release-lg';
    const badgeLabel = { feature: 'Feature Release', bugfix: 'Bug Fix Release', breaking: 'Breaking Changes', release: 'Release' }[rt] || rt;

    const sectionTypes = [...new Set(cl.sections.map(s => classifySection(s.heading)).filter(Boolean))];

    const filterBar = sectionTypes.length > 1 ? `
      <div class="filter-bar">
        <button class="filter-chip ${state.activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
        ${sectionTypes.map(t => `
          <button class="filter-chip ${state.activeFilter === t ? 'active' : ''}" onclick="setFilter('${t}')">
            ${t.replace('-', ' ')}
          </button>`).join('')}
      </div>` : '';

    const sectionsHtml = cl.sections
      .filter(s => state.activeFilter === 'all' || classifySection(s.heading) === state.activeFilter)
      .map(sec => {
        const cls = classifySection(sec.heading);
        const itemsHtml = sec.items.map(item => {
          const tickets = item.tickets?.length
            ? `<div class="item-tickets">${item.tickets.map(t => `<span class="ticket">${esc(t)}</span>`).join('')}</div>`
            : '';
          return `<div class="item"><div class="item-text">${esc(item.text)}</div>${tickets}</div>`;
        }).join('');
        return `
          <div class="section">
            <div class="section-heading ${cls}">${esc(sec.heading)}</div>
            <div class="item-list">${itemsHtml}</div>
          </div>`;
      }).join('');

    const sysReq = cl.systemRequirements ? `
      <div class="sysreq">
        <div class="sysreq-label">System Requirements</div>
        <div class="sysreq-text">${esc(cl.systemRequirements)}</div>
      </div>` : '';

    $main.innerHTML = `
      <div class="changelog-header">
        <div class="changelog-version">
          <h1>${esc(cl.version)}</h1>
          <span class="release-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        ${cl.intro ? `<p class="changelog-intro">${esc(cl.intro)}</p>` : ''}
        <a class="source-link" href="${esc(cl.sourceUrl)}" target="_blank" rel="noopener">↗ View on Autodesk Help</a>
      </div>
      ${filterBar}
      ${sectionsHtml || '<div class="empty-state"><p style="color:var(--muted)">No sections were parsed from this page.</p></div>'}
      ${sysReq}`;
  }

  // ── Select version ─────────────────────────────────────────────────────────
  window.selectVersion = function(id) {
    state.activeId = id;
    state.activeFilter = 'all';
    renderSidebar();
    const cl = state.data.changelogs.find(c => c.versionId === id);
    if (cl) renderChangelog(cl);
  };

  window.setFilter = function(f) {
    state.activeFilter = f;
    const cl = state.data.changelogs.find(c => c.versionId === state.activeId);
    if (cl) renderChangelog(cl);
  };

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  async function init() {
    try {
      state.data = await loadData();

      if (!state.data.changelogs?.length) {
        $list.innerHTML = '';
        $main.innerHTML = `
          <div class="empty-state">
            <h2>No data yet</h2>
            <p>Run the GitHub Actions workflow (or <code>node scraper.js</code> locally) to populate the changelogs.</p>
          </div>`;
        return;
      }

      if (state.data.updatedAt) {
        const d = new Date(state.data.updatedAt);
        $updatedAt.textContent = `Updated ${d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`;
      }

      renderSidebar();
      // Auto-select latest
      selectVersion(state.data.changelogs[0].versionId);

    } catch (e) {
      $list.innerHTML = '';
      $main.innerHTML = `<div class="error-box">Failed to load changelog data: ${esc(e.message)}</div>`;
    }
  }

  init();
</script>

</body>
</html>
