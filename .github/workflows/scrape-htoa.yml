name: Scrape Arnold HtoA Changelogs

on:
  workflow_dispatch:  # Manual trigger only — automatic runs handled by check-versions.yml

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run HtoA scraper
        run: node scraper-htoa.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/changelogs-htoa.json
          git diff --staged --quiet || git commit -m "chore: update Arnold HtoA changelogs [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push
